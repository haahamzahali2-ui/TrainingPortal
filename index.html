<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareTrack — Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>

<style>
:root {
  --navy:#0f1f38;
  --navy-mid:#1a3255;
  --teal:#1a9c8a;
  --teal-light:#2fd6c2;
  --cream:#f6f4ef;
  --white:#ffffff;
  --muted:#8a97aa;
  --text:#1c2b3a;
  --border:#e3e8f0;
  --green:#2db87a;
  --shadow:0 6px 24px rgba(15,31,56,0.08);
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  margin:0;
}

header{
  background:var(--navy);
  color:white;
  padding:16px 32px;
  font-family:'DM Serif Display',serif;
  font-size:1.4rem;
  box-shadow:var(--shadow);
}

nav{
  display:flex;
  background:var(--navy-mid);
}

.tab-btn{
  flex:1;
  padding:14px;
  border:none;
  background:none;
  color:#8aa4c7;
  cursor:pointer;
  font-weight:600;
}

.tab-btn.active{
  color:var(--teal-light);
  border-bottom:3px solid var(--teal-light);
}

main{
  padding:30px;
  max-width:1100px;
  margin:auto;
}

.card{
  background:var(--white);
  border-radius:14px;
  padding:20px;
  box-shadow:var(--shadow);
  margin-bottom:20px;
}

.card-title{
  font-weight:600;
  margin-bottom:15px;
}

table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  padding:10px;
  border-bottom:1px solid var(--border);
}

tr{
  transition:0.2s;
  cursor:pointer;
}

tr:hover{
  background:#eef7f6;
}

canvas{
  margin-top:10px;
}

</style>
</head>

<body>

<header>CareTrack Dashboard</header>

<nav>
<button class="tab-btn active" onclick="switchTab('individual',this)">Individual</button>
<button class="tab-btn" onclick="switchTab('population',this)">Population</button>
</nav>

<main>

<!-- INDIVIDUAL -->
<div id="panel-individual">

<div class="card">
<div class="card-title">Patient History</div>

<table>
<thead>
<tr>
<th>Patient</th>
<th>Visits</th>
<th>BP Trend</th>
<th>A1C</th>
</tr>
</thead>

<tbody>
<tr onclick="loadPatient('PT-1042')">
<td>PT-1042</td>
<td>4</td>
<td>158 → 132</td>
<td>7.8 → 6.8</td>
</tr>

<tr onclick="loadPatient('PT-0887')">
<td>PT-0887</td>
<td>3</td>
<td>144 → 138</td>
<td>6.9 → 6.6</td>
</tr>

<tr onclick="loadPatient('PT-1103')">
<td>PT-1103</td>
<td>2</td>
<td>162 → 168</td>
<td>8.1 → 7.9</td>
</tr>
</tbody>

</table>
</div>

<div class="card">
<div class="card-title">Patient Trends</div>
<canvas id="chart"></canvas>
</div>

</div>

<!-- POPULATION -->
<div id="panel-population" style="display:none;">
<div class="card">
<div class="card-title">Population Stats</div>
<p>71% BP improvement • 64% A1C improvement</p>
</div>
</div>

</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

function switchTab(name,btn){
document.getElementById('panel-individual').style.display = name==='individual'?'block':'none';
document.getElementById('panel-population').style.display = name==='population'?'block':'none';

document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
}

let chart;

const data = {
"PT-1042": {
dates:["Jan","Feb","Mar","Apr"],
bp:[158,148,140,132],
a1c:[7.8,7.4,7.1,6.8]
},
"PT-0887": {
dates:["Jan","Feb","Mar"],
bp:[144,140,138],
a1c:[6.9,6.7,6.6]
},
"PT-1103": {
dates:["Jan","Feb"],
bp:[162,168],
a1c:[8.1,7.9]
}
};

function loadPatient(id){

const ctx = document.getElementById('chart');

if(chart) chart.destroy();

chart = new Chart(ctx,{
type:'line',
data:{
labels:data[id].dates,
datasets:[
{
label:'Systolic BP',
data:data[id].bp,
borderWidth:3,
tension:0.4
},
{
label:'A1C',
data:data[id].a1c,
borderWidth:3,
tension:0.4
}
]
},
options:{
plugins:{
legend:{
labels:{font:{size:12}}
}
}
}
});

}

</script>

</body>
</html>
